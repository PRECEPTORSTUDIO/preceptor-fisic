<!doctype html>
<html lang="pt-BR" class="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icon-192.svg" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#050505" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Preceptor" />
		<meta name="description" content="Preceptor Fisic — prescrição clínica para profissionais CREF/CREFITO" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="viewport">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			// Service worker DESATIVADO. O SW de cache anterior devolvia respostas
			// redirecionadas nas navegações de auth, quebrando o site
			// ("Response served by service worker has redirections" / ERR_FAILED).
			// Aqui desregistramos qualquer SW remanescente e limpamos os caches
			// em TODOS os ambientes — e não registramos nenhum novo. (O /sw.js
			// virou um kill switch, então quem ainda tem o SW velho também é
			// recuperado quando o navegador checa a atualização do script.)
			if ('serviceWorker' in navigator) {
				navigator.serviceWorker.getRegistrations().then(function (regs) {
					regs.forEach(function (r) {
						r.unregister();
					});
				});
				if (window.caches && caches.keys) {
					caches.keys().then(function (keys) {
						keys.forEach(function (k) {
							caches.delete(k);
						});
					});
				}
			}
		</script>
	</body>
</html>
