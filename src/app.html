<!doctype html>
<html lang="pt-BR" data-theme="%theme%" data-theme-pref="%themePref%">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<!-- PNG obrigatório — iOS não rasteriza SVG em apple-touch-icon -->
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
		<!-- Manifest NÃO é global: o app do profissional injeta o dele no layout
		     (app) e o app do aluno serve um manifest dinâmico por /a/[id] — o
		     navegador usa o PRIMEIRO link, então um global aqui quebraria o PWA
		     do aluno (start_url iria pro /dashboard do profissional). -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#050505" />
		<!-- Anti-flash: quando a preferência é "system", só o cliente sabe qual
		     tema aplicar (o servidor não enxerga prefers-color-scheme). Este
		     script é síncrono e roda no <head>, ou seja, ANTES do primeiro
		     paint — resolve o tema sem piscar. Preferência explícita já vem
		     resolvida do servidor via cookie, e aqui é no-op. -->
		<script nonce="%sveltekit.nonce%">
			(function () {
				try {
					var el = document.documentElement;
					if (el.dataset.themePref === 'system' || !el.dataset.theme) {
						el.dataset.theme = window.matchMedia('(prefers-color-scheme: dark)').matches
							? 'dark'
							: 'light';
					}
					var meta = document.querySelector('meta[name="theme-color"]');
					if (meta) meta.setAttribute('content', el.dataset.theme === 'light' ? '#ffffff' : '#050505');
				} catch (e) {}
			})();
		</script>
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Preceptor" />
		<meta
			name="description"
			content="PreceptorFISIC — prescrição clínica para profissionais CREF/CREFITO"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="viewport">
		<div style="display: contents">%sveltekit.body%</div>
		<script nonce="%sveltekit.nonce%">
			// Service worker DESATIVADO. O SW de cache anterior devolvia respostas
			// redirecionadas nas navegações de auth, quebrando o site
			// ("Response served by service worker has redirections" / ERR_FAILED).
			// Aqui desregistramos qualquer SW remanescente e limpamos os caches
			// em TODOS os ambientes — e não registramos nenhum novo. (O /sw.js
			// virou um kill switch, então quem ainda tem o SW velho também é
			// recuperado quando o navegador checa a atualização do script.)
			if ('serviceWorker' in navigator) {
				navigator.serviceWorker.getRegistrations().then(function (regs) {
					regs.forEach(function (r) {
						r.unregister();
					});
				});
				if (window.caches && caches.keys) {
					caches.keys().then(function (keys) {
						keys.forEach(function (k) {
							caches.delete(k);
						});
					});
				}
			}
		</script>
	</body>
</html>
