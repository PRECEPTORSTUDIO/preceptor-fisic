<!doctype html>
<html lang="pt-BR" class="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icon-192.svg" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#050505" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Preceptor" />
		<meta name="description" content="Preceptor Fisic — prescrição clínica para profissionais CREF/CREFITO" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="viewport">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			if ('serviceWorker' in navigator) {
				// Registra após load idle pra não competir com paint inicial
				window.addEventListener('load', () => {
					setTimeout(() => navigator.serviceWorker.register('/sw.js').catch(() => {}), 0);
				});
			}
		</script>
	</body>
</html>
